<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Link</title>
</head>
<body>

    <h2>Just view image</h2>
    <a href="./image/paris.jpg">
        <img src="./image/paris.jpg" alt="paris image" width="100">
    </a>

    <hr>

    <!-- 웹 서버 환경에서만 다운로드 링크는 반응함.. Live server -->
    <h2>Download image</h2>
    <a href="./image/paris.jpg" download="aaa.jpg">
        <img src="./image/paris.jpg" alt="paris image" width="100">
    </a>
    
</body>
</html>
